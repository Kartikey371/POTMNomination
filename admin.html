<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Nominate — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1320; --card:#141F33; --card-line:#22304A; --gold:#E8A33D;
    --text:#F2F0E9; --muted:#7C8AA5; --green:#4CAF80; --red:#D9655B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding-bottom:40px;}
  .wrap{max-width:480px; margin:0 auto; padding:0 18px;}
  header{padding:28px 0 18px; text-align:center;}
  .logo{width:72px; height:72px; border-radius:50%; object-fit:cover; margin-bottom:10px;}
  .eyebrow{font-family:'Bebas Neue',sans-serif; letter-spacing:.18em; color:var(--gold); font-size:13px; margin:0 0 4px;}
  h1{font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:.02em; margin:0; line-height:1;}
  .sub{color:var(--muted); font-size:14px; margin-top:8px; line-height:1.5;}
  nav{display:flex; gap:8px; margin:22px 0 18px; background:var(--card); border-radius:14px; padding:4px;}
  nav button{flex:1; padding:10px 0; border:none; border-radius:10px; background:transparent; color:var(--muted); font-family:'Inter',sans-serif; font-weight:700; font-size:13px; letter-spacing:.03em; cursor:pointer;}
  nav button.active{background:var(--gold); color:#1A1304;}
  .card{background:var(--card); border:1px solid var(--card-line); border-radius:16px; padding:18px; margin-bottom:14px;}
  .voter-row{margin-bottom:16px;}
  .voter-row label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; display:block; margin-bottom:6px;}
  input[type=text]{width:100%; background:#0F1828; border:1px solid var(--card-line); border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; font-family:'Inter',sans-serif;}
  input[type=text]:focus{outline:none; border-color:var(--gold);}
  .podium{display:flex; align-items:flex-end; gap:10px; margin:8px 0 22px;}
  .podium .slot{flex:1; text-align:center;}
  .podium .bar{border-radius:10px 10px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:8px; font-family:'Bebas Neue'; font-size:22px;}
  .slot.s1 .bar{height:120px; background:linear-gradient(180deg,#F4C766,var(--gold)); color:#1A1304;}
  .slot.s2 .bar{height:90px; background:#3C4B6B; color:var(--text);}
  .slot.s3 .bar{height:66px; background:#2A3650; color:var(--text);}
  .slot .name{font-size:13px; font-weight:700; margin-top:8px; line-height:1.2;}
  .slot .count{font-size:11px; color:var(--muted); margin-top:2px;}
  .slot .rank{font-family:'Bebas Neue'; font-size:13px; color:var(--muted);}
  .leaderboard-row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--card-line);}
  .leaderboard-row:last-child{border-bottom:none;}
  .lb-left{display:flex; align-items:center; gap:12px;}
  .lb-rank{font-family:'Bebas Neue'; font-size:18px; color:var(--muted); width:22px;}
  .lb-rank.top{color:var(--gold);}
  .lb-name{font-size:14px; font-weight:600;}
  .lb-count{font-size:14px; font-weight:800; color:var(--gold);}
  .empty{text-align:center; color:var(--muted); font-size:14px; padding:30px 0;}
  .footnote{font-size:12px; color:var(--muted); text-align:center; margin-top:18px; line-height:1.5;}
  .manage-row{display:flex; gap:8px; margin-bottom:10px;}
  .manage-row input{flex:1;}
  .add-btn{background:var(--card-line); border:none; border-radius:10px; color:var(--gold); font-family:'Bebas Neue'; font-size:14px; padding:0 16px; cursor:pointer;}
  .player-chip{display:flex; align-items:center; justify-content:space-between; background:#0F1828; border-radius:10px; padding:10px 12px; margin-bottom:8px; font-size:14px;}
  .player-chip button{background:none; border:none; color:var(--red); font-size:13px; cursor:pointer; font-weight:700;}
  .reset-btn{width:100%; padding:12px; border-radius:10px; border:1px solid var(--red); background:none; color:var(--red); font-family:'Inter'; font-weight:700; font-size:13px; cursor:pointer; margin-top:6px;}
  .msg{font-size:13px; margin-top:10px; text-align:center;}
  .msg.ok{color:var(--green);} .msg.err{color:var(--red);}
  .status{font-size:12px; color:var(--muted); text-align:center; margin-top:10px;}
  .lock-screen{text-align:center; padding:60px 0;}
  .lock-screen input{margin-bottom:14px;}
  .lock-btn{width:100%; padding:14px; border:none; border-radius:12px; background:var(--gold); color:#1A1304; font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:.04em; cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="logo.png" alt="Dynamic Dynamos" class="logo">
    <p class="eyebrow">ADMIN</p>
    <h1>Nominate</h1>
    <p class="sub">Results and player management.</p>
  </header>

  <div id="lockScreen" class="card lock-screen">
    <div class="voter-row" style="text-align:left;">
      <label>Admin password</label>
      <input type="text" id="adminPassword" placeholder="Enter password">
    </div>
    <button class="lock-btn" id="unlockBtn">Unlock</button>
    <div class="msg" id="lockMsg"></div>
  </div>

  <div id="adminContent" style="display:none;">
    <nav>
      <button id="tab-results" class="active">Results</button>
      <button id="tab-manage">Players</button>
      <button id="tab-history">History</button>
    </nav>

    <div id="view-results">
      <div class="card" id="roundStatusCard" style="display:none;"></div>
      <div class="card" id="podiumCard" style="display:none;">
        <div class="podium" id="podium"></div>
      </div>
      <div class="card"><div id="leaderboard"></div></div>
      <p class="footnote" id="voteCountNote"></p>
      <button class="add-btn" id="startRound2Btn" style="width:100%; padding:12px; font-size:15px; display:none;">Start Round 2 with Top 3</button>
      <button class="reset-btn" id="backToRound1Btn" style="display:none;">Cancel Round 2 (no archive)</button>
      <button class="add-btn" id="archiveBtn" style="width:100%; padding:12px; font-size:15px; display:none; margin-top:8px;">Archive This Poll &amp; Start New One</button>
    </div>

    <div id="view-history" style="display:none;">
      <div id="historyList"><div class="empty">Loading...</div></div>
    </div>

    <div id="view-manage" style="display:none;">
      <div class="card">
        <div class="manage-row">
          <input type="text" id="newPlayerName" placeholder="Add player name">
          <button class="add-btn" id="addPlayerBtn">ADD</button>
        </div>
        <div id="playerList"></div>
        <button class="reset-btn" id="resetVotesBtn">Reset all votes</button>
      </div>
      <div class="card">
        <div class="voter-row">
          <label>Bulk import players</label>
          <textarea id="bulkPlayers" rows="5" placeholder="Paste names here, one per line (or comma-separated)" style="width:100%; background:#0F1828; border:1px solid var(--card-line); border-radius:10px; padding:12px 14px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; resize:vertical;"></textarea>
        </div>
        <button class="add-btn" id="bulkAddBtn" style="width:100%; padding:12px; font-size:15px;">ADD ALL</button>
        <div class="msg" id="bulkMsg"></div>
      </div>
    </div>
    <p class="status" id="connStatus">Connecting...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, addDoc, collection, getDocs, writeBatch, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnpf_l0WWngwIOfuLQDbQ2HvAYtOpt0yU",
  authDomain: "player-of-the-month.firebaseapp.com",
  projectId: "player-of-the-month",
  storageBucket: "player-of-the-month.firebasestorage.app",
  messagingSenderId: "79635632178",
  appId: "1:79635632178:web:499e8401ef1400ce116c2b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = "DynamicDynamos@2026";
const DEFAULT_PLAYERS = ["Player A","Player B","Player C","Player D","Player E","Player F"];
let players = [];
let votes = [];

const lockScreen = document.getElementById('lockScreen');
const adminContent = document.getElementById('adminContent');
const tabResults = document.getElementById('tab-results');
const tabManage = document.getElementById('tab-manage');
const tabHistory = document.getElementById('tab-history');
const viewResults = document.getElementById('view-results');
const viewManage = document.getElementById('view-manage');
const viewHistory = document.getElementById('view-history');
const connStatus = document.getElementById('connStatus');

document.getElementById('unlockBtn').onclick = ()=>{
  const pw = document.getElementById('adminPassword').value;
  if(pw === ADMIN_PASSWORD){
    lockScreen.style.display='none';
    adminContent.style.display='block';
    boot();
  } else {
    document.getElementById('lockMsg').textContent = 'Incorrect password.';
    document.getElementById('lockMsg').className = 'msg err';
  }
};
document.getElementById('adminPassword').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('unlockBtn').click();
});

function showTab(tab){
  [tabResults,tabManage,tabHistory].forEach(b=>b.classList.remove('active'));
  [viewResults,viewManage,viewHistory].forEach(v=>v.style.display='none');
  if(tab==='results'){tabResults.classList.add('active'); viewResults.style.display='block'; renderResults();}
  if(tab==='manage'){tabManage.classList.add('active'); viewManage.style.display='block'; renderManage();}
  if(tab==='history'){tabHistory.classList.add('active'); viewHistory.style.display='block'; renderHistory();}
}
tabResults.onclick=()=>showTab('results');
tabManage.onclick=()=>showTab('manage');
tabHistory.onclick=()=>showTab('history');

async function ensurePlayersDoc(){
  const ref = doc(db, 'meta', 'players');
  const snap = await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref, {list: DEFAULT_PLAYERS});
    return DEFAULT_PLAYERS.slice();
  }
  return snap.data().list || [];
}

async function loadPlayers(){
  try{
    players = await ensurePlayersDoc();
  }catch(e){
    console.error(e);
    connStatus.textContent = 'Could not connect to Firebase: ' + e.message;
    players = DEFAULT_PLAYERS.slice();
  }
}

async function savePlayers(){
  await setDoc(doc(db, 'meta', 'players'), {list: players});
}

async function loadVotes(){
  const snap = await getDocs(collection(db, 'votes'));
  votes = snap.docs.map(d=>({id:d.id, picks:d.data().picks}));
}

async function loadRound(){
  try{
    const snap = await getDoc(doc(db,'meta','round'));
    return snap.exists() ? snap.data() : {stage:'round1'};
  }catch(e){ return {stage:'round1'}; }
}

async function renderResults(){
  const lb = document.getElementById('leaderboard');
  const podiumCard = document.getElementById('podiumCard');
  const podium = document.getElementById('podium');
  const note = document.getElementById('voteCountNote');
  const roundCard = document.getElementById('roundStatusCard');
  const startBtn = document.getElementById('startRound2Btn');
  const backBtn = document.getElementById('backToRound1Btn');
  const archiveBtn = document.getElementById('archiveBtn');
  lb.innerHTML = '<div class="empty">Loading...</div>';
  startBtn.style.display='none';
  backBtn.style.display='none';
  roundCard.style.display='none';
  archiveBtn.style.display='none';

  const round = await loadRound();

  if(round.stage === 'round2'){
    roundCard.style.display='block';
    roundCard.innerHTML = `<div class="footnote" style="margin:0; color:var(--gold);">ROUND 2 LIVE — runoff between: ${round.finalists.join(', ')}</div>`;
    backBtn.style.display='block';

    let r2votes = [];
    try{
      const snap = await getDocs(collection(db,'votes_round2'));
      r2votes = snap.docs.map(d=>d.data());
    }catch(e){
      lb.innerHTML = '<div class="empty">Could not load round 2 results: '+e.message+'</div>';
      return;
    }

    if(r2votes.length===0){
      lb.innerHTML = '<div class="empty">No round 2 votes yet.</div>';
      podiumCard.style.display='none'; note.textContent=''; return;
    }

    const tally = {};
    round.finalists.forEach(p=>tally[p]=0);
    r2votes.forEach(v=>{ if(v.pick) tally[v.pick]=(tally[v.pick]||0)+1; });
    const sorted = Object.entries(tally).sort((a,b)=>b[1]-a[1]);
    renderPodiumAndList(sorted, podiumCard, podium, lb);
    note.textContent = `${r2votes.length} ${r2votes.length===1?'person has':'people have'} voted in round 2`;

    archiveBtn.style.display='block';
    archiveBtn.onclick = async ()=>{
      const winner = sorted[0];
      if(!confirm(`Archive this poll with "${winner ? winner[0] : 'no winner'}" as the result and start a fresh poll? Current votes will be cleared after saving.`)) return;
      try{
        await loadVotes(); // ensure round1 votes loaded fresh
        const r1Tally = {};
        players.forEach(p=>r1Tally[p]=0);
        votes.forEach(v=>(v.picks||[]).forEach(p=>{ if(p) r1Tally[p]=(r1Tally[p]||0)+1; }));

        await addDoc(collection(db,'history'), {
          completedAt: Date.now(),
          round1Tally: r1Tally,
          round1Voters: votes.length,
          finalists: round.finalists,
          round2Tally: tally,
          round2Voters: r2votes.length,
          winner: winner ? winner[0] : null,
          winnerVotes: winner ? winner[1] : 0
        });

        const batch = writeBatch(db);
        const r1snap = await getDocs(collection(db,'votes'));
        r1snap.docs.forEach(d=>batch.delete(d.ref));
        const r2snap = await getDocs(collection(db,'votes_round2'));
        r2snap.docs.forEach(d=>batch.delete(d.ref));
        await batch.commit();
        await deleteDoc(doc(db,'meta','round'));

        alert('Poll archived. Ready for a new round 1.');
        renderResults();
      }catch(e){
        alert('Could not archive: '+e.message);
      }
    };
    return;
  }

  // round1
  try{
    await loadVotes();
  }catch(e){
    lb.innerHTML = '<div class="empty">Could not load results: '+e.message+'</div>';
    return;
  }

  if(votes.length===0){
    lb.innerHTML = '<div class="empty">No nominations yet.</div>';
    podiumCard.style.display='none'; note.textContent=''; return;
  }

  const tally = {};
  players.forEach(p=>tally[p]=0);
  votes.forEach(v=>(v.picks||[]).forEach(p=>{ if(p) tally[p]=(tally[p]||0)+1; }));
  const sorted = Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  renderPodiumAndList(sorted, podiumCard, podium, lb);
  note.textContent = `${votes.length} ${votes.length===1?'person has':'people have'} voted`;

  const top3 = sorted.filter(([,c])=>c>0).slice(0,3);
  if(top3.length===3){
    startBtn.style.display='block';
    startBtn.onclick = async ()=>{
      if(!confirm(`Start Round 2 with: ${top3.map(t=>t[0]).join(', ')}? Voters will then only see this runoff.`)) return;
      try{
        await setDoc(doc(db,'meta','round'), {stage:'round2', finalists: top3.map(t=>t[0])});
        renderResults();
      }catch(e){ alert('Could not start round 2: '+e.message); }
    };
  }
}

function renderPodiumAndList(sorted, podiumCard, podium, lb){
  const top3 = sorted.slice(0,3);
  if(top3.length>=1 && top3[0][1]>0){
    podiumCard.style.display='block';
    const order = [top3[1], top3[0], top3[2]];
    const classes = ['s2','s1','s3']; const ranks=['2ND','1ST','3RD'];
    podium.innerHTML = order.map((entry,i)=>{
      if(!entry) return `<div class="slot ${classes[i]}"><div class="bar"></div><div class="name">—</div><div class="count"></div></div>`;
      const [name,count]=entry;
      return `<div class="slot ${classes[i]}"><div class="rank">${ranks[i]}</div><div class="bar">${count}</div><div class="name">${name}</div><div class="count">${count} vote${count===1?'':'s'}</div></div>`;
    }).join('');
  } else { podiumCard.style.display='none'; }

  lb.innerHTML = sorted.filter(([,c])=>c>0).map(([name,count],i)=>`
    <div class="leaderboard-row">
      <div class="lb-left"><div class="lb-rank ${i<3?'top':''}">${i+1}</div><div class="lb-name">${name}</div></div>
      <div class="lb-count">${count}</div>
    </div>`).join('') || '<div class="empty">No votes recorded yet.</div>';
}

async function renderHistory(){
  const list = document.getElementById('historyList');
  list.innerHTML = '<div class="empty">Loading...</div>';
  try{
    const snap = await getDocs(query(collection(db,'history'), orderBy('completedAt','desc')));
    if(snap.empty){
      list.innerHTML = '<div class="empty">No archived polls yet.</div>';
      return;
    }
    list.innerHTML = snap.docs.map(d=>{
      const h = d.data();
      const date = new Date(h.completedAt).toLocaleDateString(undefined, {year:'numeric', month:'short', day:'numeric'});
      const finalistsLine = (h.finalists||[]).map(f=>{
        const c = (h.round2Tally && h.round2Tally[f]) || 0;
        return `${f} (${c})`;
      }).join(', ');
      return `
        <div class="card">
          <div class="footnote" style="margin-top:0; text-align:left;">${date} · ${h.round1Voters||0} round 1 votes · ${h.round2Voters||0} round 2 votes</div>
          <div class="winner-row" style="font-family:'Bebas Neue'; font-size:24px; color:var(--gold); margin:4px 0 6px;">🏆 ${h.winner || 'No winner'}</div>
          <div class="footnote" style="margin-top:0; text-align:left;">Finalists: ${finalistsLine || '—'}</div>
        </div>
      `;
    }).join('');
  }catch(e){
    list.innerHTML = '<div class="empty">Could not load history: '+e.message+'</div>';
  }
}

document.getElementById('backToRound1Btn').onclick = async ()=>{
  if(!confirm('Cancel Round 2 without saving any history? This permanently deletes round 2 votes.')) return;
  try{
    const snap = await getDocs(collection(db,'votes_round2'));
    const batch = writeBatch(db);
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    await deleteDoc(doc(db,'meta','round'));
    renderResults();
  }catch(e){ alert('Could not reset: '+e.message); }
};

function renderManage(){
  const list = document.getElementById('playerList');
  list.innerHTML = players.map((p,i)=>`<div class="player-chip"><span>${p}</span><button data-i="${i}" class="rm-btn">Remove</button></div>`).join('');
  list.querySelectorAll('.rm-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const i = parseInt(btn.dataset.i);
      const removed = players[i];
      players.splice(i,1);
      try{ await savePlayers(); renderManage(); }
      catch(e){ players.splice(i,0,removed); alert('Could not remove: '+e.message); renderManage(); }
    };
  });
}

document.getElementById('addPlayerBtn').onclick = async ()=>{
  const input = document.getElementById('newPlayerName');
  const name = input.value.trim();
  if(!name) return;
  if(players.some(p=>p.toLowerCase()===name.toLowerCase())){ input.value=''; return; }
  players.push(name);
  try{ await savePlayers(); input.value=''; renderManage(); }
  catch(e){ players.pop(); alert('Could not add: '+e.message); }
};

document.getElementById('bulkAddBtn').onclick = async ()=>{
  const ta = document.getElementById('bulkPlayers');
  const msg = document.getElementById('bulkMsg');
  const raw = ta.value.trim();
  if(!raw){ return; }
  const names = raw.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
  const before = players.length;
  names.forEach(name=>{
    if(!players.some(p=>p.toLowerCase()===name.toLowerCase())){
      players.push(name);
    }
  });
  const added = players.length - before;
  try{
    await savePlayers();
    ta.value='';
    msg.textContent = `Added ${added} player${added===1?'':'s'}.`;
    msg.className = 'msg ok';
    renderManage();
  }catch(e){
    players.length = before;
    msg.textContent = 'Could not save: ' + e.message;
    msg.className = 'msg err';
  }
};

document.getElementById('resetVotesBtn').onclick = async ()=>{
  if(!confirm('Clear all submitted votes for everyone? This cannot be undone.')) return;
  try{
    const snap = await getDocs(collection(db, 'votes'));
    const batch = writeBatch(db);
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    alert('Votes cleared.');
    renderResults();
  }catch(e){
    alert('Could not reset: '+e.message);
  }
};

async function boot(){
  try{
    await loadPlayers();
    connStatus.textContent = '';
    showTab('results');
  }catch(e){
    connStatus.textContent = 'Connection error: ' + e.message;
  }
}
</script>
</body>
</html>
