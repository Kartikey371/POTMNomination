<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Nominate — Winner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1320; --card:#141F33; --card-line:#22304A; --gold:#E8A33D;
    --text:#F2F0E9; --muted:#7C8AA5; --green:#4CAF80; --red:#D9655B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{margin:0; background:radial-gradient(circle at 50% 0%, #1A2440 0%, var(--bg) 60%); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding-bottom:40px;}
  .wrap{max-width:480px; margin:0 auto; padding:0 18px;}
  header{padding:28px 0 10px; text-align:center;}
  .logo{width:72px; height:72px; border-radius:50%; object-fit:cover; margin-bottom:10px;}
  .eyebrow{font-family:'Bebas Neue',sans-serif; letter-spacing:.22em; color:var(--gold); font-size:13px; margin:0 0 4px;}
  h1{font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:.02em; margin:0; line-height:1;}
  .sub{color:var(--muted); font-size:14px; margin-top:8px; line-height:1.5;}
  .card{background:var(--card); border:1px solid var(--card-line); border-radius:16px; padding:18px; margin-bottom:14px;}

  .lock-screen{text-align:center; padding:60px 0;}
  .voter-row{margin-bottom:16px; text-align:left;}
  .voter-row label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; display:block; margin-bottom:6px;}
  input[type=text]{width:100%; background:#0F1828; border:1px solid var(--card-line); border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; font-family:'Inter',sans-serif;}
  input[type=text]:focus{outline:none; border-color:var(--gold);}
  .lock-btn{width:100%; padding:14px; border:none; border-radius:12px; background:var(--gold); color:#1A1304; font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:.04em; cursor:pointer;}
  .msg{font-size:13px; margin-top:10px; text-align:center;}
  .msg.ok{color:var(--green);} .msg.err{color:var(--red);}

  .winner-card{text-align:center; padding:34px 18px; border:1px solid var(--gold); position:relative; overflow:hidden;}
  .crown{font-size:38px; margin-bottom:6px;}
  .winner-label{font-family:'Bebas Neue'; letter-spacing:.2em; color:var(--gold); font-size:13px;}
  .winner-name{font-family:'Bebas Neue'; font-size:48px; line-height:1; margin:10px 0 6px;}
  .winner-votes{color:var(--muted); font-size:14px;}

  .podium{display:flex; align-items:flex-end; gap:10px; margin:8px 0 6px;}
  .podium .slot{flex:1; text-align:center;}
  .podium .bar{border-radius:10px 10px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:8px; font-family:'Bebas Neue'; font-size:24px;}
  .slot.s1 .bar{height:130px; background:linear-gradient(180deg,#F4C766,var(--gold)); color:#1A1304;}
  .slot.s2 .bar{height:96px; background:#3C4B6B; color:var(--text);}
  .slot.s3 .bar{height:70px; background:#2A3650; color:var(--text);}
  .slot .name{font-size:14px; font-weight:700; margin-top:8px; line-height:1.2;}
  .slot .count{font-size:11px; color:var(--muted); margin-top:2px;}
  .slot .rank{font-family:'Bebas Neue'; font-size:13px; color:var(--muted);}

  .empty{text-align:center; color:var(--muted); font-size:14px; padding:30px 0;}
  .footnote{font-size:12px; color:var(--muted); text-align:center; margin-top:18px; line-height:1.5;}
  .status{font-size:12px; color:var(--muted); text-align:center; margin-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="logo.png" alt="Dynamic Dynamos" class="logo">
    <p class="eyebrow">FINAL RESULTS</p>
    <h1>The Winner</h1>
  </header>

  <div id="lockScreen" class="card lock-screen">
    <div class="voter-row">
      <label>Admin password</label>
      <input type="text" id="adminPassword" placeholder="Enter password">
    </div>
    <button class="lock-btn" id="unlockBtn">Unlock</button>
    <div class="msg" id="lockMsg"></div>
  </div>

  <div id="content" style="display:none;">
    <div id="winnerArea"></div>
    <div class="card" id="podiumCard" style="display:none;">
      <div class="podium" id="podium"></div>
    </div>
    <p class="footnote" id="voteCountNote"></p>
    <p class="status" id="connStatus"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnpf_l0WWngwIOfuLQDbQ2HvAYtOpt0yU",
  authDomain: "player-of-the-month.firebaseapp.com",
  projectId: "player-of-the-month",
  storageBucket: "player-of-the-month.firebasestorage.app",
  messagingSenderId: "79635632178",
  appId: "1:79635632178:web:499e8401ef1400ce116c2b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = "DynamicDynamos@2026";
const DEFAULT_PLAYERS = ["Player A","Player B","Player C","Player D","Player E","Player F"];

const lockScreen = document.getElementById('lockScreen');
const content = document.getElementById('content');
const connStatus = document.getElementById('connStatus');

document.getElementById('unlockBtn').onclick = ()=>{
  const pw = document.getElementById('adminPassword').value;
  if(pw === ADMIN_PASSWORD){
    lockScreen.style.display='none';
    content.style.display='block';
    boot();
  } else {
    document.getElementById('lockMsg').textContent = 'Incorrect password.';
    document.getElementById('lockMsg').className = 'msg err';
  }
};
document.getElementById('adminPassword').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('unlockBtn').click();
});

async function boot(){
  const winnerArea = document.getElementById('winnerArea');
  const podiumCard = document.getElementById('podiumCard');
  const podium = document.getElementById('podium');
  const note = document.getElementById('voteCountNote');

  winnerArea.innerHTML = '<div class="empty">Loading...</div>';

  let round = {stage:'round1'};
  try{
    const rSnap = await getDoc(doc(db,'meta','round'));
    if(rSnap.exists()) round = rSnap.data();
  }catch(e){}

  let sorted = [];
  let totalVoters = 0;
  let usingRound2 = false;

  try{
    if(round.stage === 'round2'){
      usingRound2 = true;
      const vSnap = await getDocs(collection(db,'votes_round2'));
      const r2votes = vSnap.docs.map(d=>d.data());
      totalVoters = r2votes.length;
      const tally = {};
      (round.finalists||[]).forEach(p=>tally[p]=0);
      r2votes.forEach(v=>{ if(v.pick) tally[v.pick]=(tally[v.pick]||0)+1; });
      sorted = Object.entries(tally).sort((a,b)=>b[1]-a[1]).filter(([,c])=>c>0);
    } else {
      let players = DEFAULT_PLAYERS.slice();
      const pSnap = await getDoc(doc(db, 'meta', 'players'));
      if(pSnap.exists()) players = pSnap.data().list || players;
      const vSnap = await getDocs(collection(db, 'votes'));
      const votes = vSnap.docs.map(d=>d.data());
      totalVoters = votes.length;
      const tally = {};
      players.forEach(p=>tally[p]=0);
      votes.forEach(v=>(v.picks||[]).forEach(p=>{ if(p) tally[p]=(tally[p]||0)+1; }));
      sorted = Object.entries(tally).sort((a,b)=>b[1]-a[1]).filter(([,c])=>c>0);
    }
  }catch(e){
    connStatus.textContent = 'Could not load: ' + e.message;
    winnerArea.innerHTML = '<div class="empty">Could not load results.</div>';
    return;
  }

  if(totalVoters===0 || sorted.length===0){
    winnerArea.innerHTML = usingRound2
      ? '<div class="empty">Round 2 is live but no votes yet.</div>'
      : '<div class="empty">No nominations yet — nothing to announce.</div>';
    podiumCard.style.display='none';
    return;
  }

  const top3 = sorted.slice(0,3);
  const [winnerName, winnerCount] = top3[0];
  const stageLabel = usingRound2 ? 'PLAYER OF THE MONTH — FINAL' : 'LEADING (ROUND 1, NOT FINAL)';
  winnerArea.innerHTML = `
    <div class="card winner-card">
      <div class="crown">🏆</div>
      <div class="winner-label">${stageLabel}</div>
      <div class="winner-name">${winnerName}</div>
      <div class="winner-votes">${winnerCount} vote${winnerCount===1?'':'s'}</div>
    </div>
  `;

  podiumCard.style.display='block';
  const order = [top3[1], top3[0], top3[2]];
  const classes = ['s2','s1','s3']; const ranks=['2ND','1ST','3RD'];
  podium.innerHTML = order.map((entry,i)=>{
    if(!entry) return `<div class="slot ${classes[i]}"><div class="bar"></div><div class="name">—</div><div class="count"></div></div>`;
    const [name,count]=entry;
    return `<div class="slot ${classes[i]}"><div class="rank">${ranks[i]}</div><div class="bar">${count}</div><div class="name">${name}</div><div class="count">${count} vote${count===1?'':'s'}</div></div>`;
  }).join('');

  note.textContent = usingRound2
    ? `Based on ${totalVoters} round 2 ${totalVoters===1?'vote':'votes'}`
    : `Based on ${totalVoters} round 1 ${totalVoters===1?'submission':'submissions'} — start Round 2 in Admin for a final result`;
}
</script>
</body>
</html>
